<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#10271f" />
    <title>Camp Lawton · Offline</title>
    <style>
      *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:#10271f;color:#fcfaf5;font-family:Segoe UI,Arial,sans-serif}.card{max-width:560px;padding:44px;border:1px solid #426452;background:#16382b;box-shadow:0 24px 70px #08151080}.brand{width:72px;height:72px}.eyebrow{margin:24px 0 10px;color:#e2b95f;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}h1{margin:0;font:500 44px/1.05 Georgia,serif}p{margin:20px 0 0;color:#dce5df;line-height:1.7}button{margin-top:26px;padding:13px 20px;border:0;border-radius:4px;background:#a54826;color:white;font:700 14px inherit;cursor:pointer}
    </style>
  </head>
  <body>
    <main class="card">
      <img class="brand" src="/images/logo-ui.webp" alt="" width="96" height="96" />
      <p class="eyebrow">Camp Lawton Leader Hub</p>
      <h1>You’re offline.</h1>
      <p>Reconnect to view the working Leader's Guide, notices, mountain conditions, and non-binding planning survey. Current staff direction always takes precedence over saved information.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
